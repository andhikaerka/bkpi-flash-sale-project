services:
  postgres:
    image: postgres:15-alpine
    container_name: flash-sale-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flash_sale
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flash_sale"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: flash-sale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: flash-sale-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      # Anonymous volume agar node_modules dari image tidak tertimpa oleh host mount
      - /app/node_modules
    command: sh -c "npx prisma db push --accept-data-loss && npm run dev"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/flash_sale?schema=public&connection_limit=20
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: flash-sale-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Anonymous volume agar node_modules dari image tidak tertimpa oleh host mount
      - /app/node_modules
    command: sh -c "npm run dev"
    depends_on:
      backend:
        condition: service_healthy

  k6:
    image: grafana/k6:latest
    container_name: flash-sale-k6
    volumes:
      - ./k6-script.js:/scripts/k6-script.js
    environment:
      - API_URL=http://backend:3000/purchase
    command: run /scripts/k6-script.js
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - loadtest

volumes:
  postgres_data:
  redis_data: